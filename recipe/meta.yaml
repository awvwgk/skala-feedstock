{% set version = "2026.1" %}

package:
  name: skala
  version: "{{ version }}"

source:
  url: https://github.com/microsoft/skala/archive/v{{ version }}.tar.gz
  sha256: c7c28add4e7b02b0ee83260e7294736427c6d40c8dc696894da82b9ddc8c3c9d

build:
  number: 0
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  noarch: python

requirements:
  host:
    - pip
    - python {{ python_min }}
    - setuptools
  run:
    - ase
    - azure-core
    - azure-identity
    - dftd3-python
    - e3nn
    - huggingface_hub
    - numpy
    - opt_einsum_fx
    - pyscf >=2.8,<2.14
    - python >={{ python_min }}
    - pytorch
    - qcelemental

test:
  imports:
    - skala
    - skala.ase
    - skala.foundry
    - skala.functional
    - skala.pyscf
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://aka.ms/dft
  dev_url: https://github.com/microsoft/skala
  doc_url: https://microsoft.github.io/skala
  summary: Skala Exchange Correlation Functional
  license: MIT
  license_file:
    - NOTICE.md
    - LICENSE.txt

extra:
  recipe-maintainers:
    - awvwgk
